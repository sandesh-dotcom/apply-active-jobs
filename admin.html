<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mopid Jobs · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:       #E7704C;
    --accent-dark:  #d55c38;
    --ink:          #1E1E1E;
    --text:         #334155;
    --muted:        #64748b;
    --line:         #e2e8f0;
    --bg:           #f8fafc;
    --card:         #ffffff;
    --danger:       #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .page-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    text-align: center;
  }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; text-align: center; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06);
    padding: 24px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
  }

  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .hint { font-weight: 400; color: var(--muted); }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
  input::placeholder, textarea::placeholder { color: #94a3b8; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(231,112,76,0.18);
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .grid-2 { grid-template-columns: 1fr; } }

  .primary-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    cursor: pointer;
  }
  .primary-btn:hover:not(:disabled) { background: var(--accent-dark); }
  .primary-btn:disabled { background: #94a3b8; cursor: not-allowed; }

  .logout-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  .error-box, .ok-box {
    display: none;
    margin-top: 12px;
    padding: 11px 13px;
    border-radius: 10px;
    font-size: 13px;
  }
  .error-box { color: #7f1d1d; background: #fef2f2; border: 1px solid #fecaca; }
  .ok-box { color: #14532d; background: #f0fdf4; border: 1px solid #bbf7d0; }

  /* Job rows */
  .job-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
  }
  .job-row:last-child { border-bottom: none; }
  .job-row-title { font-size: 14px; font-weight: 700; color: var(--ink); }
  .job-row-meta { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .job-row-meta code {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 11px;
  }

  .row-actions { flex: none; display: flex; gap: 8px; }

  .edit-btn {
    flex: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .edit-btn:hover { background: var(--bg); }

  .delete-btn {
    flex: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--danger);
    background: none;
    border: 1px solid #fecaca;
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .delete-btn:hover { background: #fef2f2; }

  .type-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 8px;
    margin-right: 6px;
    border-radius: 999px;
    background: rgba(59,130,246,0.10);
    color: #1d4ed8;
    border: 1px solid rgba(59,130,246,0.25);
  }

  .cancel-edit-btn {
    display: none;
    width: 100%;
    margin-top: 10px;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  .jd-toolbar { display: flex; gap: 6px; margin-bottom: 8px; }
  .jd-toolbar button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .jd-toolbar button:hover { background: var(--line); }
  .jd-toolbar button i { font-style: italic; }

  .empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }

  .topbar {
    width: 100%;
    max-width: 560px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .topbar .who { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<h1 class="page-title">Jobs Admin</h1>
<p class="page-sub">Add or remove jobs shown on the careers page</p>

<!-- ── Login ── -->
<div class="card" id="loginCard">
  <div class="card-title">Sign in</div>
  <div class="field">
    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="admin@mopid.me">
  </div>
  <div class="field">
    <label for="loginPassword">Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
  </div>
  <button class="primary-btn" id="loginBtn" onclick="login()">Sign in</button>
  <div class="error-box" id="loginError"></div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">

  <div class="topbar">
    <span class="who" id="whoami"></span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>

  <div class="card" id="formCard">
    <div class="card-title" id="formTitle">Add a new job</div>

    <div class="field">
      <label for="jTitle">Job title</label>
      <input type="text" id="jTitle" placeholder="e.g. Customer Support Executive — Voice">
    </div>

    <div class="field">
      <label for="jUuid">ATS Job Id <span class="hint">(internal — never shown to candidates)</span></label>
      <input type="text" id="jUuid" placeholder="e.g. 33-c4168">
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="jLocation">Location</label>
        <input type="text" id="jLocation" placeholder="e.g. HSR Layout, Bangalore">
      </div>
      <div class="field">
        <label for="jMode">Mode</label>
        <select id="jMode">
          <option value="In Office" selected>In Office</option>
          <option value="Remote">Remote</option>
          <option value="Hybrid">Hybrid</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="jType">Job type</label>
        <select id="jType">
          <option value="Voice" selected>Voice</option>
          <option value="Non-Voice">Non-Voice</option>
          <option value="Voice + Chat">Voice + Chat</option>
        </select>
      </div>
      <div class="field">
        <label for="jSalary">Salary <span class="hint">(shown with ₹)</span></label>
        <input type="text" id="jSalary" placeholder="e.g. 18,000 – 22,000 / month">
      </div>
    </div>

    <div class="field">
      <label for="jLanguages">Languages needed <span class="hint">(comma separated)</span></label>
      <input type="text" id="jLanguages" placeholder="e.g. English, Hindi">
    </div>

    <div class="field">
      <label for="jMap">Location map link <span class="hint">(Google Maps URL, optional)</span></label>
      <input type="text" id="jMap" placeholder="https://maps.app.goo.gl/...">
    </div>

    <div class="field">
      <label for="jJd">Job description</label>
      <div class="jd-toolbar">
        <button type="button" onclick="wrapSelection('**','**')" title="Bold"><b>B</b></button>
        <button type="button" onclick="wrapSelection('*','*')" title="Italic"><i>I</i></button>
        <button type="button" onclick="prefixLines('- ')" title="Bullet list">• List</button>
        <button type="button" onclick="prefixLines('1. ')" title="Numbered list">1. List</button>
      </div>
      <textarea id="jJd" placeholder="Role details, shift, requirements, interview process..."></textarea>
      <div class="hint" style="margin-top:6px;">Select text and click a button, or type **bold**, *italic*, "- " for bullets, "1. " for a numbered list.</div>
    </div>

    <button class="primary-btn" id="addBtn" onclick="saveJob()">Add job</button>
    <button class="cancel-edit-btn" id="cancelEditBtn" onclick="cancelEdit()">Cancel edit</button>
    <div class="error-box" id="addError"></div>
    <div class="ok-box" id="addOk"></div>
  </div>

  <div class="card">
    <div class="card-title">Live jobs</div>
    <div id="jobRows"><div class="empty">Loading…</div></div>
  </div>

</div>

<script>
  let auth = sessionStorage.getItem("mopid_admin_auth") || null;

  function authHeader() {
    return { "Content-Type": "application/json", "Authorization": "Basic " + auth };
  }

  async function adminCall(body) {
    const res = await fetch("/api/admin", {
      method: "POST",
      headers: authHeader(),
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  function showBox(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(function () { el.style.display = "none"; }, 4000);
  }

  // ── Login ──
  async function login() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorBox = document.getElementById("loginError");
    errorBox.style.display = "none";

    if (!email || !password) {
      errorBox.textContent = "Enter email and password.";
      errorBox.style.display = "block";
      return;
    }

    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    auth = btoa(email + ":" + password);
    try {
      await adminCall({ action: "login" });
      sessionStorage.setItem("mopid_admin_auth", auth);
      document.getElementById("whoami").textContent = email;
      enterDashboard();
    } catch (err) {
      auth = null;
      errorBox.textContent = err.message;
      errorBox.style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = "Sign in";
  }

  function logout() {
    sessionStorage.removeItem("mopid_admin_auth");
    auth = null;
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginCard").style.display = "block";
  }

  function enterDashboard() {
    document.getElementById("loginCard").style.display = "none";
    const dash = document.getElementById("dashboard");
    dash.style.display = "flex";
    loadJobs();
  }

  // ── Jobs ──
  async function loadJobs() {
    const rows = document.getElementById("jobRows");
    try {
      const jobs = await adminCall({ action: "list" });
      renderJobs(jobs);
    } catch (err) {
      rows.innerHTML = "";
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = err.message;
      rows.appendChild(div);
    }
  }

  function renderJobs(jobs) {
    const rows = document.getElementById("jobRows");
    rows.innerHTML = "";

    if (!jobs.length) {
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = "No jobs yet. Add your first job above.";
      rows.appendChild(div);
      return;
    }

    jobs.forEach(function (job) {
      const row = document.createElement("div");
      row.className = "job-row";

      const info = document.createElement("div");
      const title = document.createElement("div");
      title.className = "job-row-title";
      title.textContent = job.title;
      info.appendChild(title);

      if (job.job_type) {
        const type = document.createElement("span");
        type.className = "type-tag";
        type.textContent = job.job_type;
        info.appendChild(type);
      }

      const meta = document.createElement("div");
      meta.className = "job-row-meta";
      const parts = [];
      if (job.location) parts.push(job.location);
      if (job.mode) parts.push(job.mode);
      if (job.salary) parts.push("₹ " + job.salary);
      meta.textContent = parts.join(" · ");

      const idLine = document.createElement("div");
      idLine.className = "job-row-meta";
      const code = document.createElement("code");
      code.textContent = "ATS: " + job.job_uuid;
      idLine.appendChild(code);

      info.appendChild(meta);
      info.appendChild(idLine);
      row.appendChild(info);

      const actions = document.createElement("div");
      actions.className = "row-actions";

      const edit = document.createElement("button");
      edit.className = "edit-btn";
      edit.textContent = "Edit";
      edit.onclick = function () { startEdit(job); };
      actions.appendChild(edit);

      const del = document.createElement("button");
      del.className = "delete-btn";
      del.textContent = "Remove";
      del.onclick = function () { deleteJob(job); };
      actions.appendChild(del);

      row.appendChild(actions);

      rows.appendChild(row);
    });
  }

  // ── Job description formatting toolbar ──
  function wrapSelection(prefix, suffix) {
    const ta = document.getElementById("jJd");
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const value = ta.value;
    const selected = value.slice(start, end) || "text";
    ta.value = value.slice(0, start) + prefix + selected + suffix + value.slice(end);
    ta.focus();
    const cursorStart = start + prefix.length;
    ta.setSelectionRange(cursorStart, cursorStart + selected.length);
  }

  function prefixLines(prefix) {
    const ta = document.getElementById("jJd");
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const value = ta.value;
    const lineStart = value.lastIndexOf("\n", start - 1) + 1;
    let lineEnd = value.indexOf("\n", end);
    if (lineEnd === -1) lineEnd = value.length;
    const block = value.slice(lineStart, lineEnd);
    let n = 1;
    const newBlock = block.split("\n").map(function (line) {
      const stripped = line.replace(/^(\d+\.\s+|-\s+)/, "");
      return prefix === "1. " ? (n++) + ". " + stripped : prefix + stripped;
    }).join("\n");
    ta.value = value.slice(0, lineStart) + newBlock + value.slice(lineEnd);
    ta.focus();
    ta.setSelectionRange(lineStart, lineStart + newBlock.length);
  }

  let editingId = null;

  function startEdit(job) {
    editingId = job.id;
    document.getElementById("jTitle").value = job.title || "";
    document.getElementById("jUuid").value = job.job_uuid || "";
    document.getElementById("jLocation").value = job.location || "";
    document.getElementById("jMode").value = job.mode || "In Office";
    document.getElementById("jType").value = job.job_type || "Voice";
    document.getElementById("jSalary").value = job.salary || "";
    document.getElementById("jLanguages").value = job.languages || "";
    document.getElementById("jMap").value = job.map_link || "";
    document.getElementById("jJd").value = job.jd || "";

    document.getElementById("formTitle").textContent = "Edit job";
    document.getElementById("addBtn").textContent = "Save changes";
    document.getElementById("cancelEditBtn").style.display = "block";
    document.getElementById("formCard").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function cancelEdit() {
    editingId = null;
    ["jTitle","jUuid","jLocation","jSalary","jLanguages","jMap","jJd"].forEach(function (id) {
      document.getElementById(id).value = "";
    });
    document.getElementById("jMode").value = "In Office";
    document.getElementById("jType").value = "Voice";
    document.getElementById("formTitle").textContent = "Add a new job";
    document.getElementById("addBtn").textContent = "Add job";
    document.getElementById("cancelEditBtn").style.display = "none";
  }

  async function saveJob() {
    const errId = "addError";
    const job = {
      title: document.getElementById("jTitle").value.trim(),
      job_uuid: document.getElementById("jUuid").value.trim(),
      location: document.getElementById("jLocation").value.trim(),
      mode: document.getElementById("jMode").value,
      job_type: document.getElementById("jType").value,
      salary: document.getElementById("jSalary").value.trim(),
      languages: document.getElementById("jLanguages").value.trim(),
      map_link: document.getElementById("jMap").value.trim(),
      jd: document.getElementById("jJd").value.trim()
    };

    if (!job.title || !job.job_uuid) {
      showBox(errId, "Job title and ATS Job Id are required.");
      return;
    }
    if (job.map_link && !/^https?:\/\//i.test(job.map_link)) {
      showBox(errId, "Map link must be a full URL starting with https://");
      return;
    }

    const isEdit = !!editingId;
    const btn = document.getElementById("addBtn");
    btn.disabled = true;
    btn.textContent = isEdit ? "Saving…" : "Adding…";

    try {
      const jobs = isEdit
        ? await adminCall({ action: "edit", id: editingId, job: job })
        : await adminCall({ action: "add", job: job });
      renderJobs(jobs);
      showBox("addOk", isEdit ? "Job updated." : "Job added — it's live on the careers page now.");
      cancelEdit();
      btn.disabled = false;
    } catch (err) {
      showBox(errId, err.message);
      btn.disabled = false;
      btn.textContent = isEdit ? "Save changes" : "Add job";
    }
  }

  async function deleteJob(job) {
    if (!confirm('Remove "' + job.title + '" from the careers page?')) return;
    try {
      const jobs = await adminCall({ action: "delete", id: job.id });
      renderJobs(jobs);
    } catch (err) {
      alert(err.message);
    }
  }

  // Auto-login if session exists
  if (auth) {
    adminCall({ action: "login" })
      .then(function () {
        document.getElementById("whoami").textContent = "Signed in";
        enterDashboard();
      })
      .catch(function () { logout(); });
  }

  // Enter to sign in
  ["loginEmail", "loginPassword"].forEach(function (id) {
    document.getElementById(id).addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });
  });
</script>

</body>
</html>
