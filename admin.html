<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mopid Jobs · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:       #E7704C;
    --accent-dark:  #d55c38;
    --ink:          #1E1E1E;
    --text:         #334155;
    --muted:        #64748b;
    --line:         #e2e8f0;
    --bg:           #f8fafc;
    --card:         #ffffff;
    --danger:       #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header svg { height: 26px; width: auto; display: block; }
  header .header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .admin-main {
    padding: 28px 16px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .page-title {
    font-size: 19px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    text-align: center;
  }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; text-align: center; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06);
    padding: 24px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 24px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
  }

  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .hint { font-weight: 400; color: var(--muted); }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
  input::placeholder, textarea::placeholder { color: #94a3b8; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(231,112,76,0.18);
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .grid-2 { grid-template-columns: 1fr; } }

  .primary-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .primary-btn:hover:not(:disabled) { background: var(--accent-dark); }
  .primary-btn:disabled { background: #94a3b8; cursor: not-allowed; }

  .logout-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  .error-box, .ok-box {
    display: none;
    margin-top: 12px;
    padding: 11px 13px;
    border-radius: 10px;
    font-size: 13px;
  }
  .error-box { color: #7f1d1d; background: #fef2f2; border: 1px solid #fecaca; }
  .ok-box { color: #14532d; background: #f0fdf4; border: 1px solid #bbf7d0; }

  /* Job rows */
  .job-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .job-row:last-child { margin-bottom: 0; }
  .job-row:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(231,112,76,0.10);
    transform: translateY(-1px);
  }
  .job-row-title { font-size: 14px; font-weight: 700; color: var(--ink); }
  .job-row-meta { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .job-row-meta code {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 11px;
  }

  .row-actions { flex: none; display: flex; align-items: center; gap: 8px; }

  .reorder-btns { flex: none; display: flex; flex-direction: column; gap: 2px; }
  .reorder-btn {
    font-family: inherit;
    font-size: 11px;
    line-height: 1;
    color: var(--muted);
    background: none;
    border: 1px solid var(--line);
    border-radius: 6px;
    width: 24px;
    height: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .reorder-btn:hover:not(:disabled) { background: var(--bg); color: var(--ink); }
  .reorder-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .edit-btn {
    flex: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .edit-btn:hover { background: var(--bg); }

  .delete-btn {
    flex: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--danger);
    background: none;
    border: 1px solid #fecaca;
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .delete-btn:hover { background: #fef2f2; }

  .type-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 8px;
    margin-right: 6px;
    border-radius: 999px;
    background: rgba(59,130,246,0.10);
    color: #1d4ed8;
    border: 1px solid rgba(59,130,246,0.25);
  }

  .cancel-edit-btn {
    display: none;
    width: 100%;
    margin-top: 10px;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  .jd-toolbar { display: flex; gap: 6px; margin-bottom: 8px; }
  .jd-toolbar button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 12px;
    cursor: pointer;
  }
  .jd-toolbar button:hover { background: var(--line); }
  .jd-toolbar button i { font-style: italic; }

  .jd-editor {
    width: 100%;
    min-height: 160px;
    max-height: 420px;
    overflow-y: auto;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    line-height: 1.6;
    border: 1px solid var(--line);
    border-radius: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .jd-editor:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(231,112,76,0.18);
  }
  .jd-editor:empty:before {
    content: attr(data-placeholder);
    color: #94a3b8;
    pointer-events: none;
  }
  .jd-editor div, .jd-editor p { margin: 0 0 8px; }
  .jd-editor div:last-child, .jd-editor p:last-child { margin-bottom: 0; }
  .jd-editor ul, .jd-editor ol { margin: 0 0 8px 22px; padding: 0; }
  .jd-editor li { margin-bottom: 4px; }
  .jd-editor b, .jd-editor strong { font-weight: 700; }

  .empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }

  .topbar {
    width: 100%;
    max-width: 1120px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .topbar .who { font-size: 13px; color: var(--muted); }

  /* Desktop: form and job list side by side instead of one narrow column */
  .admin-grid {
    width: 100%;
    max-width: 1120px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    align-items: start;
  }
  .admin-grid .card { margin-bottom: 0; }
  @media (min-width: 960px) {
    .admin-grid { grid-template-columns: 1fr 1fr; }
    .admin-grid .card { max-width: none; }
    #formCard { position: sticky; top: 88px; }
  }
</style>
</head>

<div class="admin-main">

<h1 class="page-title">Jobs Admin</h1>
<p class="page-sub">Add or remove jobs shown on the careers page</p>

<!-- ── Login ── -->
<div class="card" id="loginCard">
  <div class="card-title">Sign in</div>
  <div class="field">
    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="admin@mopid.me">
  </div>
  <div class="field">
    <label for="loginPassword">Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
  </div>
  <button class="primary-btn" id="loginBtn" onclick="login()">Sign in</button>
  <div class="error-box" id="loginError"></div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard" style="display:none; width:100%; flex-direction:column; align-items:center;">

  <div class="topbar">
    <span class="who" id="whoami"></span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>

  <div class="admin-grid">

  <div class="card" id="formCard">
    <div class="card-title" id="formTitle">Add a new job</div>

    <div class="field">
      <label for="jTitle">Job title</label>
      <input type="text" id="jTitle" placeholder="e.g. Customer Support Executive — Voice">
    </div>

    <div class="field">
      <label for="jUuid">ATS Job Id <span class="hint">(internal — never shown to candidates)</span></label>
      <input type="text" id="jUuid" placeholder="e.g. 33-c4168">
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="jState">State</label>
        <select id="jState">
          <option value="">Select state…</option>
        </select>
      </div>
      <div class="field">
        <label for="jCity">City</label>
        <select id="jCity">
          <option value="">Select state first…</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="jArea">Area / locality <span class="hint">(optional, type freely — suggestions shown for the selected city)</span></label>
      <input type="text" id="jArea" list="areaSuggestions" placeholder="e.g. HSR Layout">
      <datalist id="areaSuggestions"></datalist>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="jMode">Mode</label>
        <select id="jMode">
          <option value="In Office" selected>In Office</option>
          <option value="Remote">Remote</option>
          <option value="Hybrid">Hybrid</option>
        </select>
      </div>
      <div class="field">
        <label for="jType">Job type</label>
        <select id="jType">
          <option value="Voice" selected>Voice</option>
          <option value="Non-Voice">Non-Voice</option>
          <option value="Voice + Chat">Voice + Chat</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="jSalary">Salary <span class="hint">(shown with ₹)</span></label>
        <input type="text" id="jSalary" placeholder="e.g. 18,000 – 22,000 / month">
      </div>
      <div class="field">
        <label for="jLanguages">Languages needed <span class="hint">(comma separated)</span></label>
        <input type="text" id="jLanguages" placeholder="e.g. English, Hindi">
      </div>
    </div>

    <div class="field">
      <label for="jMap">Location map link <span class="hint">(Google Maps URL, optional)</span></label>
      <input type="text" id="jMap" placeholder="https://maps.app.goo.gl/...">
    </div>

    <div class="field">
      <label for="jJd">Job description</label>
      <div class="jd-toolbar">
        <button type="button" onmousedown="event.preventDefault()" onclick="formatJd('bold')" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" onmousedown="event.preventDefault()" onclick="formatJd('italic')" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" onmousedown="event.preventDefault()" onclick="formatJd('insertUnorderedList')" title="Bullet list">• List</button>
        <button type="button" onmousedown="event.preventDefault()" onclick="formatJd('insertOrderedList')" title="Numbered list">1. List</button>
      </div>
      <div id="jJd" class="jd-editor" contenteditable="true" data-placeholder="Role details, shift, requirements, interview process..."></div>
    </div>

    <button class="primary-btn" id="addBtn" onclick="saveJob()">Add job</button>
    <button class="cancel-edit-btn" id="cancelEditBtn" onclick="cancelEdit()">Cancel edit</button>
    <div class="error-box" id="addError"></div>
    <div class="ok-box" id="addOk"></div>
  </div>

  <div class="card">
    <div class="card-title">Live jobs</div>
    <div id="jobRows"><div class="empty">Loading…</div></div>
  </div>

  </div>

</div>

</div>

    "Ahmedabad": ["Satellite", "Vastrapur", "SG Highway", "Bopal"]
  };

  function populateStates() {
    const sel = document.getElementById("jState");
    Object.keys(STATE_CITIES).sort().forEach(function (state) {
      const opt = document.createElement("option");
      opt.value = state;
      opt.textContent = state;
      sel.appendChild(opt);
    });
  }

  function populateCities(state, selectedCity) {
    const sel = document.getElementById("jCity");
    sel.innerHTML = "";
    const cities = STATE_CITIES[state] || [];
    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = cities.length ? "Select city…" : "Select state first…";
    sel.appendChild(placeholder);
    cities.forEach(function (city) {
      const opt = document.createElement("option");
      opt.value = city;
      opt.textContent = city;
      sel.appendChild(opt);
    });
    sel.value = selectedCity && cities.indexOf(selectedCity) !== -1 ? selectedCity : "";
    populateAreaSuggestions(sel.value);
  }

  function populateAreaSuggestions(city) {
    const list = document.getElementById("areaSuggestions");
    list.innerHTML = "";
    (CITY_LOCALITIES[city] || []).forEach(function (area) {
      const opt = document.createElement("option");
      opt.value = area;
      list.appendChild(opt);
    });
  }

  populateStates();
  document.getElementById("jState").addEventListener("change", function () {
    populateCities(this.value);
  });
  document.getElementById("jCity").addEventListener("change", function () {
    populateAreaSuggestions(this.value);
  });

  let auth = sessionStorage.getItem("mopid_admin_auth") || null;

  function authHeader() {
    return { "Content-Type": "application/json", "Authorization": "Basic " + auth };
  }

  async function adminCall(body) {
    const res = await fetch("/api/admin", {
      method: "POST",
      headers: authHeader(),
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  function showBox(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(function () { el.style.display = "none"; }, 4000);
  }

  // ── Login ──
  async function login() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorBox = document.getElementById("loginError");
    errorBox.style.display = "none";

    if (!email || !password) {
      errorBox.textContent = "Enter email and password.";
      errorBox.style.display = "block";
      return;
    }

    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    auth = btoa(email + ":" + password);
    try {
      await adminCall({ action: "login" });
      sessionStorage.setItem("mopid_admin_auth", auth);
      document.getElementById("whoami").textContent = email;
      enterDashboard();
    } catch (err) {
      auth = null;
      errorBox.textContent = err.message;
      errorBox.style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = "Sign in";
  }

  function logout() {
    sessionStorage.removeItem("mopid_admin_auth");
    auth = null;
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginCard").style.display = "block";
  }

  function enterDashboard() {
    document.getElementById("loginCard").style.display = "none";
    const dash = document.getElementById("dashboard");
    dash.style.display = "flex";
    loadJobs();
  }

  // ── Jobs ──
  async function loadJobs() {
    const rows = document.getElementById("jobRows");
    try {
      const jobs = await adminCall({ action: "list" });
      renderJobs(jobs);
    } catch (err) {
      rows.innerHTML = "";
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = err.message;
      rows.appendChild(div);
    }
  }

  let currentJobs = [];

  function renderJobs(jobs) {
    currentJobs = jobs;
    const rows = document.getElementById("jobRows");
    rows.innerHTML = "";

    if (!jobs.length) {
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = "No jobs yet. Add your first job above.";
      rows.appendChild(div);
      return;
    }

    jobs.forEach(function (job, index) {
      const row = document.createElement("div");
      row.className = "job-row";

      const info = document.createElement("div");
      const title = document.createElement("div");
      title.className = "job-row-title";
      title.textContent = job.title;
      info.appendChild(title);

      if (job.job_type) {
        const type = document.createElement("span");
        type.className = "type-tag";
        type.textContent = job.job_type;
        info.appendChild(type);
      }

      const meta = document.createElement("div");
      meta.className = "job-row-meta";
      const parts = [];
      if (job.location) parts.push(job.location);
      if (job.mode) parts.push(job.mode);
      if (job.salary) parts.push("₹ " + job.salary);
      meta.textContent = parts.join(" · ");

      const idLine = document.createElement("div");
      idLine.className = "job-row-meta";
      const code = document.createElement("code");
      code.textContent = "ATS: " + job.job_uuid;
      idLine.appendChild(code);

      info.appendChild(meta);
      info.appendChild(idLine);
      row.appendChild(info);

      const actions = document.createElement("div");
      actions.className = "row-actions";

      const reorder = document.createElement("div");
      reorder.className = "reorder-btns";

      const up = document.createElement("button");
      up.className = "reorder-btn";
      up.textContent = "▲";
      up.disabled = index === 0;
      up.title = "Move up";
      up.onclick = function () { moveJob(job.id, -1); };
      reorder.appendChild(up);

      const down = document.createElement("button");
      down.className = "reorder-btn";
      down.textContent = "▼";
      down.disabled = index === jobs.length - 1;
      down.title = "Move down";
      down.onclick = function () { moveJob(job.id, 1); };
      reorder.appendChild(down);

      actions.appendChild(reorder);

      const edit = document.createElement("button");
      edit.className = "edit-btn";
      edit.textContent = "Edit";
      edit.onclick = function () { startEdit(job); };
      actions.appendChild(edit);

      const del = document.createElement("button");
      del.className = "delete-btn";
      del.textContent = "Remove";
      del.onclick = function () { deleteJob(job); };
      actions.appendChild(del);

      row.appendChild(actions);

      rows.appendChild(row);
    });
  }

  // ── Job description rich-text editor ──
  // Stored/sent as the same lightweight markdown the candidate page already
  // renders (**bold**, *italic*, "- " bullets, "1. " numbered lists), but
  // edited as real WYSIWYG rich text instead of raw markdown syntax.
  function formatJd(command) {
    document.getElementById("jJd").focus();
    document.execCommand(command, false, null);
  }

  function jdEscapeHtml(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function jdInlineFormat(s) {
    return s
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>");
  }

  function jdMarkdownToHtml(raw) {
    const lines = jdEscapeHtml(raw).split("\n");
    let html = "";
    let listType = null;

    function closeList() {
      if (listType) { html += "</" + listType + ">"; listType = null; }
    }

    lines.forEach(function (line) {
      const bullet = line.match(/^-\s+(.*)/);
      const numbered = line.match(/^\d+\.\s+(.*)/);
      if (bullet) {
        if (listType !== "ul") { closeList(); html += "<ul>"; listType = "ul"; }
        html += "<li>" + jdInlineFormat(bullet[1]) + "</li>";
      } else if (numbered) {
        if (listType !== "ol") { closeList(); html += "<ol>"; listType = "ol"; }
        html += "<li>" + jdInlineFormat(numbered[1]) + "</li>";
      } else {
        closeList();
        if (line.trim() !== "") html += "<div>" + jdInlineFormat(line) + "</div>";
      }
    });
    closeList();
    return html;
  }

  function jdInlineToMarkdown(node) {
    let out = "";
    node.childNodes.forEach(function (child) {
      if (child.nodeType === Node.TEXT_NODE) {
        out += child.textContent;
      } else if (child.nodeName === "BR") {
        out += "\n";
      } else if (child.nodeName === "B" || child.nodeName === "STRONG") {
        const inner = jdInlineToMarkdown(child);
        out += inner.trim() ? "**" + inner + "**" : inner;
      } else if (child.nodeName === "I" || child.nodeName === "EM") {
        const inner = jdInlineToMarkdown(child);
        out += inner.trim() ? "*" + inner + "*" : inner;
      } else {
        out += jdInlineToMarkdown(child);
      }
    });
    return out;
  }

  function jdHtmlToMarkdown(root) {
    const lines = [];

    function walkBlock(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent.trim();
        if (text) lines.push(text);
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      if (node.nodeName === "UL" || node.nodeName === "OL") {
        let n = 1;
        Array.prototype.forEach.call(node.children, function (li) {
          if (li.nodeName !== "LI") return;
          const text = jdInlineToMarkdown(li).replace(/\s*\n\s*/g, " ").trim();
          if (!text) return;
          lines.push(node.nodeName === "OL" ? (n++) + ". " + text : "- " + text);
        });
        return;
      }
      if (node.nodeName === "DIV" || node.nodeName === "P") {
        jdInlineToMarkdown(node).split("\n").forEach(function (line) {
          const trimmed = line.trim();
          if (trimmed) lines.push(trimmed);
        });
        return;
      }
      if (node.nodeName === "BR") return;

      // Any other wrapper (e.g. a <span> from pasted content) — recurse
      // into its children as if they were top-level blocks.
      Array.prototype.forEach.call(node.childNodes, walkBlock);
    }

    Array.prototype.forEach.call(root.childNodes, walkBlock);
    return lines.join("\n");
  }

  let editingId = null;

  function startEdit(job) {
    editingId = job.id;
    document.getElementById("jTitle").value = job.title || "";
    document.getElementById("jUuid").value = job.job_uuid || "";
    document.getElementById("jState").value = job.state || "";
    populateCities(job.state || "", job.city || "");
    document.getElementById("jArea").value = job.area || (!job.state && !job.city ? (job.location || "") : "");
    document.getElementById("jMode").value = job.mode || "In Office";
    document.getElementById("jType").value = job.job_type || "Voice";
    document.getElementById("jSalary").value = job.salary || "";
    document.getElementById("jLanguages").value = job.languages || "";
    document.getElementById("jMap").value = job.map_link || "";
    document.getElementById("jJd").innerHTML = job.jd ? jdMarkdownToHtml(job.jd) : "";

    document.getElementById("formTitle").textContent = "Edit job";
    document.getElementById("addBtn").textContent = "Save changes";
    document.getElementById("cancelEditBtn").style.display = "block";
    document.getElementById("formCard").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function cancelEdit() {
    editingId = null;
    ["jTitle","jUuid","jArea","jSalary","jLanguages","jMap"].forEach(function (id) {
      document.getElementById(id).value = "";
    });
    document.getElementById("jJd").innerHTML = "";
    document.getElementById("jState").value = "";
    populateCities("");
    document.getElementById("jMode").value = "In Office";
    document.getElementById("jType").value = "Voice";
    document.getElementById("formTitle").textContent = "Add a new job";
    document.getElementById("addBtn").textContent = "Add job";
    document.getElementById("cancelEditBtn").style.display = "none";
  }

  async function saveJob() {
    const errId = "addError";
    const state = document.getElementById("jState").value;
    const city = document.getElementById("jCity").value;
    const area = document.getElementById("jArea").value.trim();
    const job = {
      title: document.getElementById("jTitle").value.trim(),
      job_uuid: document.getElementById("jUuid").value.trim(),
      state: state,
      city: city,
      area: area,
      location: area ? (area + ", " + city) : city,
      mode: document.getElementById("jMode").value,
      job_type: document.getElementById("jType").value,
      salary: document.getElementById("jSalary").value.trim(),
      languages: document.getElementById("jLanguages").value.trim(),
      map_link: document.getElementById("jMap").value.trim(),
      jd: jdHtmlToMarkdown(document.getElementById("jJd")).trim()
    };

    if (!job.title || !job.job_uuid) {
      showBox(errId, "Job title and ATS Job Id are required.");
      return;
    }
    if (!state || !city) {
      showBox(errId, "Please select a state and city.");
      return;
    }
    if (job.map_link && !/^https?:\/\//i.test(job.map_link)) {
      showBox(errId, "Map link must be a full URL starting with https://");
      return;
    }

    const isEdit = !!editingId;
    const btn = document.getElementById("addBtn");
    btn.disabled = true;
    btn.textContent = isEdit ? "Saving…" : "Adding…";

    try {
      const jobs = isEdit
        ? await adminCall({ action: "edit", id: editingId, job: job })
        : await adminCall({ action: "add", job: job });
      renderJobs(jobs);
      showBox("addOk", isEdit ? "Job updated." : "Job added — it's live on the careers page now.");
      cancelEdit();
      btn.disabled = false;
    } catch (err) {
      showBox(errId, err.message);
      btn.disabled = false;
      btn.textContent = isEdit ? "Save changes" : "Add job";
    }
  }

  async function moveJob(id, delta) {
    const idx = currentJobs.findIndex(function (j) { return j.id === id; });
    const swapIdx = idx + delta;
    if (idx === -1 || swapIdx < 0 || swapIdx >= currentJobs.length) return;

    const reordered = currentJobs.slice();
    const tmp = reordered[idx];
    reordered[idx] = reordered[swapIdx];
    reordered[swapIdx] = tmp;

    try {
      const jobs = await adminCall({ action: "reorder", order: reordered.map(function (j) { return j.id; }) });
      renderJobs(jobs);
    } catch (err) {
      alert(err.message);
    }
  }

  async function deleteJob(job) {
    if (!confirm('Remove "' + job.title + '" from the careers page?')) return;
    try {
      const jobs = await adminCall({ action: "delete", id: job.id });
      renderJobs(jobs);
    } catch (err) {
      alert(err.message);
    }
  }

  // Auto-login if session exists
  if (auth) {
    adminCall({ action: "login" })
      .then(function () {
        document.getElementById("whoami").textContent = "Signed in";
        enterDashboard();
      })
      .catch(function () { logout(); });
  }

  // Enter to sign in
  ["loginEmail", "loginPassword"].forEach(function (id) {
    document.getElementById(id).addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });
  });
</script>
